<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracker Fiscal FIFO USD</title>
  
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#ffffff">
  <meta name="description" content="Tracker fiscal FIFO USD con dividendos e importación CSV">

  <style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; font-size: 14px; color: #333; }
  .app { padding: 1rem 0; }
  .tabs { display: flex; gap: 2px; border-bottom: 1px solid #ccc; margin-bottom: 1.5rem; overflow-x: auto; }
  .tab { padding: 7px 13px; border: none; background: none; cursor: pointer; font-size: 13px; color: #666; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; }
  .tab.active { color: #333; border-bottom-color: #333; font-weight: bold; }
  .tab:hover:not(.active) { color: #333; }
  .section { background: #fff; border: 1px solid #ccc; border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .stitle { font-size: 12px; font-weight: bold; color: #666; margin-bottom: 1rem; text-transform: uppercase; }
  .fg { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 10px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; color: #666; font-weight: bold; }
  .field input, .field select { font-size: 13px; padding: 6px 8px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 4px; font-family: monospace; }
  .btn { padding: 6px 14px; border: 1px solid #ddd; border-radius: 4px; background: transparent; cursor: pointer; font-size: 12px; }
  .btn:hover { background: #eee; }
  .btn.primary { background: #333; color: #fff; border-color: #333; }
  .btn.danger { color: #d32f2f; border-color: #f44336; }
  .btn.success { color: #2e7d32; border-color: #4caf50; }
  .btn.api-btn { background: #e3f2fd; color: #1976d2; border-color: #90caf9; padding: 6px; width: 100%; font-weight: bold;}
  .btn.api-btn:hover { background: #bbdefb; }
  .tw { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; font-size: 11px; color: #666; padding: 6px; border-bottom: 1px solid #ccc; }
  td { padding: 8px 6px; border-bottom: 1px solid #eee; }
  .mono { font-family: monospace; }
  .pos { color: #2e7d32; }
  .neg { color: #d32f2f; }
  .badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: bold; }
  .b-buy { background: #e3f2fd; color: #1976d2; }
  .b-sell { background: #fff3e0; color: #f57c00; }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1rem; }
  .metric { background: #f9f9f9; border-radius: 4px; padding: 12px; border: 1px solid #eee;}
  .metric-label { font-size: 11px; color: #666; margin-bottom: 4px; }
  .metric-value { font-size: 18px; font-weight: bold; font-family: monospace; }
  .tramo { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 12px; }
  .alert { padding: 10px; border-radius: 4px; font-size: 12px; margin-bottom: 10px; border: 1px solid transparent; }
  .al-info { background: #e3f2fd; color: #1976d2; border-color: #90caf9; }
  .al-suc { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
  .code-block { background: #f5f5f5; border: 1px solid #ccc; padding: 10px; font-family: monospace; font-size: 11px; overflow-x: auto; white-space: pre; }
  .yr-btn { padding: 4px 10px; font-size: 12px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; }
  .yr-btn.active { background: #333; color: #fff; }
  </style>
</head>
<body>

  <div class="app" id="root" style="max-width: 900px; margin: 0 auto; padding: 1rem;"></div>

  <script>
  // ESTADO BASE
  const S = {
    tab: 'dashboard',
    deposits: [],
    operations: [],
    dividends: [],
    fiscalYear: new Date().getFullYear(),
    depForm: { date:'', amountUSD:'', rateEURUSD:'', commissionEUR:'', notes:'' },
    opForm: { date:'', type:'buy', company:'', shares:'', priceUSD:'', rateEURUSD:'', commissionEUR:'', notes:'' },
    divForm: { date:'', company:'', grossUSD:'', withholdingPct:'15', rateEURUSD:'', notes:'' },
    importMsg: null,
  };

  // PERSISTENCIA LOCAL (Autoguardado)
  function loadData() {
    const saved = localStorage.getItem('fiscal_tracker_data');
    if (saved) {
      const parsed = JSON.parse(saved);
      S.deposits = parsed.deposits || [];
      S.operations = parsed.operations || [];
      S.dividends = parsed.dividends || [];
    }
  }
  function saveData() {
    localStorage.setItem('fiscal_tracker_data', JSON.stringify({
      deposits: S.deposits,
      operations: S.operations,
      dividends: S.dividends
    }));
  }

  // API BCE/BOE para tipo de cambio
  async function fetchOfficialRate(dateField, formType) {
    const dateVal = S[formType][dateField];
    if(!dateVal) { alert('Selecciona una fecha primero'); return; }
    
    try {
      // Usamos Frankfurter API (basada en datos del Banco Central Europeo)
      const res = await fetch(`https://api.frankfurter.app/${dateVal}?from=EUR&to=USD`);
      if (!res.ok) throw new Error('Dato no disponible (puede ser festivo o fin de semana).');
      const data = await res.json();
      
      if(data && data.rates && data.rates.USD) {
        const rate = data.rates.USD.toFixed(4);
        S[formType].rateEURUSD = rate;
        render();
      }
    } catch(e) {
      alert('No se encontró tipo de cambio oficial para este día (es posible que sea festivo o fin de semana). Debes buscar el del día hábil anterior.');
    }
  }

  // UTILIDADES
  const fmt = (n,d=2) => isNaN(n)?'—':Number(n).toLocaleString('es-ES',{minimumFractionDigits:d,maximumFractionDigits:d});
  const fmtUSD = n => isNaN(n)?'—':'$'+fmt(n);
  const fmtEUR = n => isNaN(n)?'—':fmt(n)+' €';
  const fmtPct = n => fmt(n)+'%';
  const today = () => new Date().toISOString().slice(0,10);
  const uid = () => 'id_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  const gn = (n) => { const v=parseFloat(String(n).replace(',','.')); return isNaN(v)?0:v; };

  // LÓGICA FIFO E IRPF (Se mantiene intacta)
  function calcFIFO(ops) {
    const lots = {}, results = [];
    const sorted = [...ops].sort((a,b) => a.date.localeCompare(b.date));
    for (const op of sorted) {
      const co = op.company;
      if (!lots[co]) lots[co] = [];
      if (op.type === 'buy') {
        const costEUR = (gn(op.shares)*gn(op.priceUSD))/gn(op.rateEURUSD) + gn(op.commissionEUR);
        lots[co].push({ shares:gn(op.shares), priceUSD:gn(op.priceUSD), rateEURUSD:gn(op.rateEURUSD), commission:gn(op.commissionEUR), costEUR, date:op.date, id:op.id });
        results.push({...op, gainEUR:null, costBasisEUR:null, remainingLots:lots[co].map(l=>({...l}))});
      } else {
        let toSell = gn(op.shares);
        const queue = lots[co];
        let costBasisEUR = 0;
        const usedLots = [];
        while (toSell > 0.00001 && queue.length > 0) {
          const lot = queue[0];
          const used = Math.min(lot.shares, toSell);
          const frac = used / lot.shares;
          const lotCostEUR = lot.costEUR * frac;
          costBasisEUR += lotCostEUR;
          usedLots.push({ shares:used, priceUSD:lot.priceUSD, rateEURUSD:lot.rateEURUSD, date:lot.date, costEUR:lotCostEUR });
          toSell -= used;
          lot.shares -= used;
          lot.costEUR -= lotCostEUR;
          if (lot.shares < 0.00001) queue.shift();
        }
        const saleRevenueEUR = (gn(op.shares)*gn(op.priceUSD))/gn(op.rateEURUSD) - gn(op.commissionEUR);
        const gainEUR = saleRevenueEUR - costBasisEUR;
        results.push({...op, gainEUR, costBasisEUR, saleRevenueEUR, usedLots, remainingLots:lots[co].map(l=>({...l}))});
      }
    }
    return { results, lots };
  }

  function calcIRPF(base) {
    if (base <= 0) return { tax:0, tramos:[] };
    const bk = [{lim:6000,rate:0.19,label:'Hasta 6.000 €'},{lim:44000,rate:0.21,label:'6.000 – 50.000 €'},{lim:150000,rate:0.23,label:'50.000 – 200.000 €'},{lim:100000,rate:0.27,label:'200.000 – 300.000 €'},{lim:Infinity,rate:0.28,label:'Más de 300.000 €'}];
    let rem = base, tax = 0;
    const tramos = [];
    for (const b of bk) { if (rem <= 0) break; const t = Math.min(rem,b.lim); const c = t*b.rate; tax+=c; tramos.push({label:b.label,rate:b.rate,base:t,tax:c}); rem-=t; }
    return { tax, tramos };
  }

  const YEARS = () => {
    const ys = new Set();
    [...S.deposits,...S.operations,...S.dividends].forEach(x => { if(x.date) ys.add(x.date.slice(0,4)); });
    const cur = String(new Date().getFullYear());
    ys.add(cur);
    return [...ys].sort();
  };
  function inYear(item) { return item.date && item.date.startsWith(String(S.fiscalYear)); }

  // EXPORTAR CSV (Adaptado para Excel Español)
  function exportCSV() {
    const { results } = calcFIFO(S.operations);
    const fifoMap = {};
    results.forEach(r => { fifoMap[r.id] = r; });
    
    // Cabeceras
    const rows = [['tipo','fecha','empresa','acciones','precio_usd','tipo_cambio_eur_usd','comision_eur','dividendo_bruto_usd','retencion_pct','deposito_usd','ingreso_eur','coste_base_eur','ganancia_eur','notas']];
    
    S.deposits.filter(inYear).forEach(d => {
      const eur = gn(d.amountUSD)/gn(d.rateEURUSD);
      rows.push(['deposito',d.date,'','','',d.rateEURUSD,d.commissionEUR||0,'','',d.amountUSD,eur.toFixed(2),'','',d.notes||'']);
    });
    S.operations.filter(inYear).forEach(op => {
      const r = fifoMap[op.id]||{};
      rows.push([op.type==='buy'?'compra':'venta',op.date,op.company,op.shares,op.priceUSD,op.rateEURUSD,op.commissionEUR||0,'','','',op.type==='sell'?(r.saleRevenueEUR||0).toFixed(2):'',op.type==='sell'?(r.costBasisEUR||0).toFixed(2):'',op.type==='sell'?(r.gainEUR||0).toFixed(2):'',op.notes||'']);
    });
    S.dividends.filter(inYear).forEach(d => {
      const gross = gn(d.grossUSD)/gn(d.rateEURUSD);
      const wh = gross * gn(d.withholdingPct)/100;
      rows.push(['dividendo',d.date,d.company,'','',d.rateEURUSD,0,d.grossUSD,d.withholdingPct,'',gross.toFixed(2),wh.toFixed(2),(gross-wh).toFixed(2),d.notes||'']);
    });

    // Cambiar separador a ";" y los decimales a "," para Excel
    const csv = rows.map(r => r.map(v => {
      let str = String(v);
      if(!isNaN(str) && str !== '') str = str.replace('.', ','); // Formato decimal ES
      return `"${str.replace(/"/g,'""')}"`;
    }).join(';')).join('\n');

    const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `fiscal_usd_${S.fiscalYear}.csv`;
    a.click();
  }

  // IMPORTAR CSV (Soporta comas o puntos y comas)
  function parseImportCSV(text) {
    const lines = text.trim().split('\n').map(l => l.trim()).filter(Boolean);
    if (lines.length < 2) return { ok:0, err:['Archivo vacío o sin datos'] };
    
    // Detectar separador
    const sep = lines[0].includes(';') ? ';' : ',';
    const header = lines[0].replace(/"/g,'').toLowerCase().split(sep).map(h=>h.trim());
    const idx = (name) => header.indexOf(name);
    
    const required = ['tipo','fecha','tipo_cambio_eur_usd'];
    const missing = required.filter(h => idx(h) === -1);
    if (missing.length) return { ok:0, err:['Columnas faltantes: '+missing.join(', ')] };
    
    let ok=0; const errs=[];
    for (let i=1;i<lines.length;i++) {
      const raw = lines[i];
      const cols = [];
      let inQ=false, cur='';
      for (let c=0;c<raw.length;c++) {
        if (raw[c]==='"') { inQ=!inQ; }
        else if (raw[c]===sep && !inQ) { cols.push(cur.trim()); cur=''; }
        else cur+=raw[c];
      }
      cols.push(cur.trim());
      
      const g = (name) => {
        let val = (cols[idx(name)]||'').replace(/"/g,'').trim();
        // Si tiene coma decimal (formato ES), convertir a punto para JS
        if (val.match(/^[0-9]+,[0-9]+$/)) val = val.replace(',', '.');
        return val;
      };

      const tipo = g('tipo').toLowerCase();
      const fecha = g('fecha');
      const rate = g('tipo_cambio_eur_usd');
      if (!fecha||!rate) { errs.push(`Línea ${i+1}: fecha o tipo de cambio vacíos`); continue; }
      
      try {
        if (tipo==='deposito') {
          S.deposits.push({ id:uid(), date:fecha, amountUSD:g('deposito_usd'), rateEURUSD:rate, commissionEUR:g('comision_eur')||'0', notes:g('notas') });
          ok++;
        } else if (tipo==='compra'||tipo==='buy') {
          S.operations.push({ id:uid(), date:fecha, type:'buy', company:g('empresa'), shares:g('acciones'), priceUSD:g('precio_usd'), rateEURUSD:rate, commissionEUR:g('comision_eur')||'0', notes:g('notas') });
          ok++;
        } else if (tipo==='venta'||tipo==='sell') {
          S.operations.push({ id:uid(), date:fecha, type:'sell', company:g('empresa'), shares:g('acciones'), priceUSD:g('precio_usd'), rateEURUSD:rate, commissionEUR:g('comision_eur')||'0', notes:g('notas') });
          ok++;
        } else if (tipo==='dividendo'||tipo==='dividend') {
          S.dividends.push({ id:uid(), date:fecha, company:g('empresa'), grossUSD:g('dividendo_bruto_usd'), withholdingPct:g('retencion_pct')||'0', rateEURUSD:rate, notes:g('notas') });
          ok++;
        } else { errs.push(`Línea ${i+1}: tipo desconocido "${tipo}"`); }
      } catch(e) { errs.push(`Línea ${i+1}: error al procesar`); }
    }
    return { ok, errs };
  }

  // RENDER UI
  function render() {
    const { tab, fiscalYear } = S;
    const { results: fifoAll, lots } = calcFIFO(S.operations);
    const fifoYear = fifoAll.filter(inYear);
    const depsYear = S.deposits.filter(inYear);
    const divsYear = S.dividends.filter(inYear);

    const totalDepEUR = depsYear.reduce((s,d)=>s+gn(d.amountUSD)/gn(d.rateEURUSD),0);
    const sells = fifoYear.filter(r=>r.type==='sell');
    const totalGainEUR = sells.reduce((s,r)=>s+(r.gainEUR||0),0);
    const divGrossEUR = divsYear.reduce((s,d)=>s+gn(d.grossUSD)/gn(d.rateEURUSD),0);
    const divWhEUR = divsYear.reduce((s,d)=>s+(gn(d.grossUSD)/gn(d.rateEURUSD))*gn(d.withholdingPct)/100,0);
    
    const baseAhorro = Math.max(0, totalGainEUR) + divGrossEUR;
    const { tax, tramos } = calcIRPF(baseAhorro);
    const taxCredit = Math.min(divWhEUR, divGrossEUR * 0.19);
    const taxFinal = Math.max(0, tax - taxCredit);

    const yearSelector = `<div style="margin-bottom:1rem">
      <span style="font-size:11px;color:#666;">AÑO FISCAL:</span>
      ${YEARS().map(y=>`<button class="yr-btn ${String(y)===String(fiscalYear)?'active':''}" onclick="setYear('${y}')">${y}</button>`).join(' ')}
    </div>`;

    let content = '';

    if (tab === 'dashboard') {
      content = `
      ${yearSelector}
      <div class="metrics">
        <div class="metric"><div class="metric-label">Depositado (EUR)</div><div class="metric-value mono">${fmtEUR(totalDepEUR)}</div></div>
        <div class="metric"><div class="metric-label">Ganancias Netas</div><div class="metric-value mono ${totalGainEUR>=0?'pos':'neg'}">${(totalGainEUR>=0?'+':'')+fmtEUR(totalGainEUR)}</div></div>
        <div class="metric"><div class="metric-label">Dividendos Brutos</div><div class="metric-value mono pos">+${fmtEUR(divGrossEUR)}</div></div>
        <div class="metric"><div class="metric-label">IRPF Estimado</div><div class="metric-value mono ${taxFinal>0?'neg':''}">${taxFinal>0?fmtEUR(taxFinal):'—'}</div></div>
      </div>`;
    }

    if (tab === 'depositos') {
      content = `
      <div class="section"><div class="stitle">Nuevo depósito</div>
        <div class="fg">
          <div class="field"><label>Fecha</label><input type="date" value="${S.depForm.date||today()}" onchange="upDep('date',this.value)"></div>
          <div class="field"><label>Importe (USD)</label><input type="number" step="0.01" value="${S.depForm.amountUSD}" onchange="upDep('amountUSD',this.value)"></div>
          <div class="field"><label>Tipo BCE (€/$)</label>
            <div style="display:flex;gap:4px">
              <input type="number" step="0.0001" value="${S.depForm.rateEURUSD}" onchange="upDep('rateEURUSD',this.value)" style="width:100%">
              <button class="btn api-btn" onclick="fetchOfficialRate('date','depForm')">🔄</button>
            </div>
          </div>
          <div class="field"><label>Comisión (€)</label><input type="number" step="0.01" value="${S.depForm.commissionEUR}" onchange="upDep('commissionEUR',this.value)"></div>
          <div class="field"><label>Notas</label><input type="text" value="${S.depForm.notes}" onchange="upDep('notes',this.value)"></div>
        </div>
        <button class="btn primary" onclick="addDeposit()">+ Añadir depósito</button>
      </div>
      <div class="section"><div class="stitle">Historial</div>
        ${S.deposits.length?`<div class="tw"><table><tr><th>Fecha</th><th>USD</th><th>Tipo</th><th>EUR equiv.</th><th>Acción</th></tr>
        ${S.deposits.map(d=>`<tr><td>${d.date}</td><td>${fmtUSD(d.amountUSD)}</td><td>${d.rateEURUSD}</td><td>${fmtEUR(gn(d.amountUSD)/gn(d.rateEURUSD))}</td><td><button class="btn danger" onclick="removeDeposit('${d.id}')">X</button></td></tr>`).join('')}
        </table></div>`:'Sin datos'}
      </div>`;
    }

    if (tab === 'operaciones') {
      content = `
      <div class="section"><div class="stitle">Nueva operación</div>
        <div class="fg">
          <div class="field"><label>Fecha</label><input type="date" value="${S.opForm.date||today()}" onchange="upOp('date',this.value)"></div>
          <div class="field"><label>Tipo</label><select onchange="upOp('type',this.value)"><option value="buy" ${S.opForm.type==='buy'?'selected':''}>Compra</option><option value="sell" ${S.opForm.type==='sell'?'selected':''}>Venta</option></select></div>
          <div class="field"><label>Ticker</label><input type="text" value="${S.opForm.company}" onchange="upOp('company',this.value.toUpperCase())"></div>
          <div class="field"><label>Nº Acciones</label><input type="number" step="0.0001" value="${S.opForm.shares}" onchange="upOp('shares',this.value)"></div>
          <div class="field"><label>Precio (USD)</label><input type="number" step="0.01" value="${S.opForm.priceUSD}" onchange="upOp('priceUSD',this.value)"></div>
          <div class="field"><label>Tipo BCE (€/$)</label>
            <div style="display:flex;gap:4px">
              <input type="number" step="0.0001" value="${S.opForm.rateEURUSD}" onchange="upOp('rateEURUSD',this.value)" style="width:100%">
              <button class="btn api-btn" onclick="fetchOfficialRate('date','opForm')">🔄</button>
            </div>
          </div>
          <div class="field"><label>Comisión (€)</label><input type="number" step="0.01" value="${S.opForm.commissionEUR}" onchange="upOp('commissionEUR',this.value)"></div>
        </div>
        <button class="btn primary" onclick="addOperation()">+ Añadir operación</button>
      </div>
      <div class="section"><div class="stitle">Historial</div>
        ${S.operations.length?`<div class="tw"><table><tr><th>Fecha</th><th>Tipo</th><th>Ticker</th><th>Acciones</th><th>Precio USD</th><th>Total EUR</th><th>Acción</th></tr>
        ${S.operations.map(op=>`<tr><td>${op.date}</td><td><span class="badge b-${op.type}">${op.type}</span></td><td><b>${op.company}</b></td><td>${op.shares}</td><td>${fmtUSD(op.priceUSD)}</td><td>${fmtEUR(gn(op.shares)*gn(op.priceUSD)/gn(op.rateEURUSD))}</td><td><button class="btn danger" onclick="removeOp('${op.id}')">X</button></td></tr>`).join('')}
        </table></div>`:'Sin datos'}
      </div>`;
    }

    if (tab === 'dividendos') {
      content = `
      <div class="section"><div class="stitle">Nuevo dividendo</div>
        <div class="fg">
          <div class="field"><label>Fecha</label><input type="date" value="${S.divForm.date||today()}" onchange="upDiv('date',this.value)"></div>
          <div class="field"><label>Ticker</label><input type="text" value="${S.divForm.company}" onchange="upDiv('company',this.value.toUpperCase())"></div>
          <div class="field"><label>Bruto (USD)</label><input type="number" step="0.01" value="${S.divForm.grossUSD}" onchange="upDiv('grossUSD',this.value)"></div>
          <div class="field"><label>Retención (%)</label><input type="number" step="0.1" value="${S.divForm.withholdingPct}" onchange="upDiv('withholdingPct',this.value)"></div>
          <div class="field"><label>Tipo BCE (€/$)</label>
            <div style="display:flex;gap:4px">
              <input type="number" step="0.0001" value="${S.divForm.rateEURUSD}" onchange="upDiv('rateEURUSD',this.value)" style="width:100%">
              <button class="btn api-btn" onclick="fetchOfficialRate('date','divForm')">🔄</button>
            </div>
          </div>
        </div>
        <button class="btn primary" onclick="addDiv()">+ Añadir dividendo</button>
      </div>
      <div class="section"><div class="stitle">Historial</div>
        ${S.dividends.length?`<div class="tw"><table><tr><th>Fecha</th><th>Ticker</th><th>Bruto USD</th><th>Neto EUR</th><th>Acción</th></tr>
        ${S.dividends.map(d=>`<tr><td>${d.date}</td><td><b>${d.company}</b></td><td>${fmtUSD(d.grossUSD)}</td><td>${fmtEUR((gn(d.grossUSD)/gn(d.rateEURUSD))*(1-gn(d.withholdingPct)/100))}</td><td><button class="btn danger" onclick="removeDiv('${d.id}')">X</button></td></tr>`).join('')}
        </table></div>`:'Sin datos'}
      </div>`;
    }

    if (tab === 'csv') {
      const sampleCSV = `tipo;fecha;empresa;acciones;precio_usd;tipo_cambio_eur_usd;comision_eur;dividendo_bruto_usd;retencion_pct;deposito_usd;notas
deposito;2024-01-10;;;;1,0850;2,50;;;1000,00;Transferencia
compra;2024-01-15;AAPL;10;185,50;1,0921;5,00;;;;Compra inicial
venta;2024-06-10;AAPL;8;210,30;1,0780;4,80;;;;Venta
dividendo;2024-02-15;AAPL;;;1,0850;;24,00;15;;;Q1 dividendo`;
      content = `
      <div class="section"><div class="stitle">Importar / Exportar (Excel)</div>
        ${yearSelector}
        <button class="btn success" onclick="exportCSV()">Descargar CSV de ${S.fiscalYear} ↓</button>
        <hr style="margin:15px 0; border:0; border-top:1px solid #eee">
        <p style="font-size:12px;margin-bottom:10px;"><b>Importar archivo (Compatible con Excel, separador ";"):</b></p>
        <input type="file" id="fileInput" accept=".csv,.txt" onchange="handleFileImport(this)">
        ${S.importMsg?`<div class="alert ${S.importMsg.ok>0?'al-suc':'neg'}" style="margin-top:10px">${S.importMsg.text}</div>`:''}
        <div class="code-block" style="margin-top:10px;">Ejemplo de formato esperado:\n${sampleCSV}</div>
        <hr style="margin:15px 0; border:0; border-top:1px solid #eee">
        <button class="btn danger" onclick="clearAll()">Borrar todos los datos locales</button>
      </div>`;
    }

    // Pestañas Fiscal y FIFO resumidas para no saturar
    if (tab === 'fifo') {
      content = `<div class="alert al-info">Coste base incluye comisiones. Criterio FIFO (art. 37 LIRPF).</div>`;
      content += [...new Set(S.operations.map(o=>o.company))].map(co=>`
        <div class="section"><div class="stitle">${co}</div>
        ${fifoAll.filter(r=>r.company===co).map(op=>`
          <div style="border-bottom:1px solid #eee;padding:8px 0;font-size:12px;">
            <b>${op.type==='buy'?'COMPRA':'VENTA'}</b> ${op.date}: ${op.shares} acc × ${fmtUSD(op.priceUSD)}
            ${op.type==='sell'?`<span class="${op.gainEUR>=0?'pos':'neg'}"> (Ganancia: ${fmtEUR(op.gainEUR)})</span>`:''}
          </div>
        `).join('')}</div>`).join('');
    }

    if (tab === 'fiscal') {
      content = `${yearSelector}<div class="section"><div class="stitle">Base imponible del ahorro ${fiscalYear}</div>
      <div class="tramo"><span>Ganancias Patrimoniales:</span> <span class="mono">${fmtEUR(totalGainEUR)}</span></div>
      <div class="tramo"><span>Rendimientos de capital (Dividendos):</span> <span class="mono pos">+${fmtEUR(divGrossEUR)}</span></div>
      <div class="tramo"><b>Base Total:</b> <b class="mono">${fmtEUR(baseAhorro)}</b></div>
      <div class="tramo"><span>Cuota Bruta IRPF:</span> <span class="mono neg">${fmtEUR(tax)}</span></div>
      <div class="tramo"><span>Deducción doble imposición:</span> <span class="mono pos">-${fmtEUR(taxCredit)}</span></div>
      <div class="tramo"><b>Cuota a Pagar:</b> <b class="mono neg">${fmtEUR(taxFinal)}</b></div>
      </div>`;
    }

    document.getElementById('root').innerHTML = `
      <div class="tabs">
        ${[['dashboard','Resumen'],['depositos','Depósitos'],['operaciones','Operaciones'],['dividendos','Dividendos'],['fifo','Lotes FIFO'],['fiscal','Impuestos'],['csv','Datos']].map(([t,l])=>`<button class="tab ${tab===t?'active':''}" onclick="setTab('${t}')">${l}</button>`).join('')}
      </div>
      ${content}
    `;
  }

  // ACCIONES Y EVENTOS
  function setTab(t){S.tab=t;render();}
  function setYear(y){S.fiscalYear=parseInt(y);render();}
  function upDep(k,v){S.depForm[k]=v;}
  function upOp(k,v){S.opForm[k]=v;}
  function upDiv(k,v){S.divForm[k]=v;}

  function addDeposit(){
    if(!S.depForm.date||!S.depForm.amountUSD||!S.depForm.rateEURUSD){alert('Faltan datos');return;}
    S.deposits.push({...S.depForm,id:uid()});
    S.depForm={date:S.depForm.date,amountUSD:'',rateEURUSD:'',commissionEUR:'',notes:''};
    saveData(); render();
  }
  function removeDeposit(id){S.deposits=S.deposits.filter(d=>d.id!==id);saveData();render();}

  function addOperation(){
    if(!S.opForm.date||!S.opForm.company||!S.opForm.shares||!S.opForm.priceUSD||!S.opForm.rateEURUSD){alert('Faltan datos');return;}
    S.operations.push({...S.opForm,id:uid()});
    S.opForm={date:S.opForm.date,type:S.opForm.type,company:S.opForm.company,shares:'',priceUSD:'',rateEURUSD:'',commissionEUR:'',notes:''};
    saveData(); render();
  }
  function removeOp(id){S.operations=S.operations.filter(o=>o.id!==id);saveData();render();}

  function addDiv(){
    if(!S.divForm.date||!S.divForm.company||!S.divForm.grossUSD||!S.divForm.rateEURUSD){alert('Faltan datos');return;}
    S.dividends.push({...S.divForm,id:uid()});
    S.divForm={date:S.divForm.date,company:S.divForm.company,grossUSD:'',withholdingPct:'15',rateEURUSD:'',notes:''};
    saveData(); render();
  }
  function removeDiv(id){S.dividends=S.dividends.filter(d=>d.id!==id);saveData();render();}

  function clearAll(){
    if(confirm('¿Borrar TODOS los datos guardados en este navegador?')){
      S.deposits=[];S.operations=[];S.dividends=[];
      localStorage.removeItem('fiscal_tracker_data');
      render();
    }
  }

  function handleFileImport(input){
    const file=input.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
      const {ok,errs}=parseImportCSV(e.target.result);
      S.importMsg={ok,text:`${ok} registros importados.${errs.length?' Hubo errores, revisa consola.':''}`};
      if (errs.length) console.log("Errores importación:", errs);
      input.value='';
      saveData();
      render();
    };
    reader.readAsText(file,'UTF-8');
  }

  // INICIO
  loadData();
  render();
  
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
  }
  </script>
</body>
</html>
